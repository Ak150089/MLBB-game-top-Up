name: game-topup-shop
region: sgp   # Singapore — nearest to Myanmar; change to nyc or fra as needed

services:
  - name: web
    # Build from source — DO will run `npm install` then `npm run build` then `npm start`
    source_dir: /
    github:
      # Replace with your actual GitHub repo after pushing
      repo: YOUR_GITHUB_USERNAME/game-topup-shop
      branch: main
      deploy_on_push: true
    build_command: npm install --legacy-peer-deps && npm run build
    run_command: npm start
    http_port: 8080
    instance_count: 1
    instance_size_slug: basic-xxs   # $5/mo — upgrade to basic-xs ($10) for production load
    envs:
      # ── Required: set these in DO dashboard under App → Settings → App-Level Env Vars ──
      - key: NODE_ENV
        value: "production"
        scope: RUN_AND_BUILD_TIME
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET   # MySQL connection string: mysql://user:pass@host:3306/dbname
      - key: JWT_SECRET
        scope: RUN_TIME
        type: SECRET   # Random 32+ char secret for session cookies
      - key: VITE_APP_ID
        scope: BUILD_TIME
        type: SECRET   # Manus OAuth App ID
      - key: OAUTH_SERVER_URL
        value: "https://api.manus.im"
        scope: RUN_TIME
      - key: VITE_OAUTH_PORTAL_URL
        value: "https://manus.im"
        scope: BUILD_TIME
      - key: OWNER_OPEN_ID
        scope: RUN_TIME
        type: SECRET   # Your Manus openId (first user to log in becomes admin)
      # ── Optional: TON / Binance auto-verify (leave blank to use manual approval only) ──
      - key: TON_WALLET_ADDRESS
        scope: RUN_TIME
        type: SECRET
      - key: TON_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: BINANCE_MERCHANT_ID
        scope: RUN_TIME
        type: SECRET
      - key: BINANCE_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: BINANCE_SECRET_KEY
        scope: RUN_TIME
        type: SECRET
      # ── S3 storage (Manus built-in or your own DO Spaces / AWS S3) ──
      - key: BUILT_IN_FORGE_API_URL
        scope: RUN_TIME
        type: SECRET
      - key: BUILT_IN_FORGE_API_KEY
        scope: RUN_TIME
        type: SECRET
      - key: VITE_FRONTEND_FORGE_API_KEY
        scope: BUILD_TIME
        type: SECRET
      - key: VITE_FRONTEND_FORGE_API_URL
        value: "https://api.manus.im"
        scope: BUILD_TIME
      - key: PORT
        value: "8080"
        scope: RUN_TIME
